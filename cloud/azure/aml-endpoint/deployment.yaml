# az ml CLI YAML
# 用法:
#   az ml online-deployment create -f deployment.yaml \
#       --endpoint-name ocr-stage2 --all-traffic \
#       --workspace-name ocr-aml-ws
$schema: https://azuremlschemas.azureedge.net/latest/managedOnlineDeployment.schema.json
name: blue
endpoint_name: ocr-stage2
model: azureml:stage2-fused:1          # az ml model create 后引用
environment: azureml:vllm-serve-env:1  # 自建或用 curated

instance_type: Standard_NC6s_v3
instance_count: 2

request_settings:
  request_timeout_ms: 300000          # 5 min
  max_concurrent_requests_per_instance: 4
  max_queue_wait_ms: 30000

liveness_probe:
  initial_delay: 600                  # 10 min, VLM 加载慢
  period: 10
  timeout: 2
  failure_threshold: 30
readiness_probe:
  initial_delay: 600
  period: 10
  timeout: 2
  failure_threshold: 30
